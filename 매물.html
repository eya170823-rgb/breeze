<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>매물 · 브리즈부동산중개 BREEZE</title>
  <meta name="description" content="브리즈부동산중개 BREEZE 매물 목록 — 매매·전세·월세" />
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="listings">
  <main>
    <section class="page-hero">
      <div class="container">
        <p class="ph-eyebrow">PROPERTIES</p>
        <h1>매물</h1>
        <p class="ph-sub">매매·전세·월세 매물을 확인하고, 마음에 드는 매물은 바로 전화 문의하세요.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="cat-row reveal" id="catRow">
          <button class="cat" data-cat="아파트">
            <span class="cat-ic"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="3" width="14" height="18" rx="1.5"/><line x1="9" y1="7" x2="9" y2="7"/><line x1="12" y1="7" x2="12" y2="7"/><line x1="15" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="9" y2="11"/><line x1="12" y1="11" x2="12" y2="11"/><line x1="15" y1="11" x2="15" y2="11"/><line x1="9" y1="15" x2="9" y2="15"/><line x1="15" y1="15" x2="15" y2="15"/><rect x="11" y="18" width="2" height="3"/></svg></span>
            <span>아파트</span>
          </button>
          <button class="cat" data-cat="원투룸">
            <span class="cat-ic"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 11 12 4l8 7"/><path d="M6 10v10h12V10"/><rect x="10.5" y="13" width="3" height="7"/></svg></span>
            <span>원·투룸</span>
          </button>
          <button class="cat" data-cat="오피스텔">
            <span class="cat-ic"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="6" width="7" height="15" rx="1"/><rect x="13" y="3" width="7" height="18" rx="1"/><line x1="6.5" y1="9" x2="8.5" y2="9"/><line x1="6.5" y1="12" x2="8.5" y2="12"/><line x1="15.5" y1="6" x2="17.5" y2="6"/><line x1="15.5" y1="9" x2="17.5" y2="9"/><line x1="15.5" y1="12" x2="17.5" y2="12"/></svg></span>
            <span>오피스텔</span>
          </button>
          <button class="cat" data-cat="상가임대">
            <span class="cat-ic"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 9 5.5 4h13L20 9"/><path d="M4 9c0 1.5 1 2.5 2.3 2.5S8.6 10.5 8.6 9c0 1.5 1 2.5 2.3 2.5S13.2 10.5 13.2 9c0 1.5 1 2.5 2.3 2.5S17.8 10.5 17.8 9"/><path d="M5 12v8h14v-8"/><rect x="9.5" y="14" width="5" height="6"/></svg></span>
            <span>상가임대</span>
          </button>
        </div>
        <div class="searchbar reveal">
          <svg class="searchbar-ic" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
          <input type="search" id="listingSearch" placeholder="지역·건물명·키워드 검색" aria-label="매물 검색" />
        </div>
        <div class="filter-bar reveal" id="filterBar">
          <button class="fpill" data-filter="type"><span class="fpill-label">종류</span><svg class="fpill-ic" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></button>
          <button class="fpill" data-filter="region"><span class="fpill-label">지역</span><svg class="fpill-ic" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></button>
          <button class="fpill" data-filter="deal"><span class="fpill-label">거래</span><svg class="fpill-ic" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></button>
          <button class="fpill" data-filter="price"><span class="fpill-label">가격</span><svg class="fpill-ic" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></button>
          <button class="fpill fpill-reset" id="filterReset" hidden>초기화 ✕</button>
        </div>
        <div class="listing-list" id="listingGrid" aria-live="polite">
          <div class="skeleton-card sk-row"></div><div class="skeleton-card sk-row"></div><div class="skeleton-card sk-row"></div>
        </div>
        <p class="empty-msg" id="listingEmpty" hidden>조건에 맞는 매물이 없습니다.</p>
      </div>
    </section>

    <section class="section cta-section">
      <div class="container cta-inner reveal">
        <h2 class="cta-title">찾으시는 매물이 없나요?</h2>
        <p class="cta-sub">원하시는 조건을 말씀해 주시면 맞춤 매물을 찾아드립니다.</p>
        <div class="contact-actions" data-contact></div>
      </div>
    </section>
  </main>

  <!-- 필터 바텀시트 -->
  <div class="sheet" id="filterSheet" hidden>
    <div class="sheet-backdrop" data-sheet-close></div>
    <div class="sheet-card" role="dialog" aria-modal="true" aria-label="필터">
      <div class="sheet-grip"></div>
      <div class="sheet-head">
        <h3 id="sheetTitle">필터</h3>
        <button class="sheet-x" data-sheet-close aria-label="닫기">&times;</button>
      </div>
      <div class="sheet-body" id="sheetBody"></div>
      <div class="sheet-foot">
        <button class="sheet-reset" id="sheetReset">초기화</button>
        <button class="sheet-apply" id="sheetApply">적용</button>
      </div>
    </div>
  </div>

  <!-- 지역별 매물 지도 시트 -->
  <div class="rsheet" id="regionSheet" hidden>
    <div class="rsheet-card" role="dialog" aria-modal="true" aria-label="지역 선택">
      <div class="rsheet-head">
        <h3 id="regionTitle">지역별 매물</h3>
        <button class="rsheet-x" data-region-close aria-label="닫기">&times;</button>
      </div>
      <div id="regionMap" class="rmap"></div>
      <div class="rchips" id="regionChips"></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="sample-data.js"></script>
  <script src="sheets.js"></script>
  <script src="layout.js"></script>
  <script src="app.js"></script>
</body>
</html>
